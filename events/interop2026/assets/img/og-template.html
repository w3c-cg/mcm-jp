<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>OGP テンプレート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800&display=block" rel="stylesheet">
<style>
  :root{
    --c-primary:#00ADBC;
    --c-primary-dark:#007A85;
    --c-primary-darker:#005159;
    --c-tint:#E5F7F8;
    --c-tint-2:#C8EEF1;
    --c-text:#0F2B2E;
    --c-text-soft:#3D6266;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;
    color:var(--c-text);
    background:
      radial-gradient(1000px 700px at 90% 110%, rgba(0,173,188,.22), transparent 60%),
      linear-gradient(160deg, var(--c-tint) 0%, var(--c-tint-2) 55%, #ffffff 100%);
    padding:56px 96px;
    display:flex;
    flex-direction:column;
    position:relative;
    font-feature-settings:"palt" 1;
  }
  .accent-bar{
    position:absolute;left:0;top:0;width:14px;height:100%;
    background:linear-gradient(180deg,var(--c-primary) 0%, var(--c-primary-dark) 100%);
  }

  /* top */
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px}
  .badge{
    display:inline-flex;align-items:center;
    padding:8px 20px;border-radius:999px;
    background:#fff;color:var(--c-primary-darker);
    font-size:22px;font-weight:700;letter-spacing:.04em;
    border:1px solid rgba(0,173,188,.35);
    box-shadow:0 4px 16px rgba(0,80,90,.08);
  }
  .brand-top{text-align:right;color:var(--c-primary-darker)}
  .brand-name{font-size:20px;font-weight:700;letter-spacing:.06em}
  .brand-sub{font-size:16px;color:var(--c-text-soft);margin-top:2px}

  /* main */
  .main{padding:0 4px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;margin:36px 0 30px}
  .kicker{
    font-size:40px;font-weight:800;color:var(--c-primary-dark);
    letter-spacing:.12em;margin:0;line-height:1.1;
  }
  h1{
    font-size:96px;line-height:1.05;color:var(--c-text);
    font-weight:800;letter-spacing:.02em;margin:0;
  }
  .tagline{
    font-size:40px;color:var(--c-primary-darker);font-weight:700;
    letter-spacing:.02em;margin:0;line-height:1.1;
  }

  /* footer info row */
  .info-row{
    display:grid;grid-template-columns:1fr 1fr;gap:18px;
  }
  .info-card{
    display:flex;flex-direction:column;align-items:flex-start;gap:6px;
    padding:12px 26px;border-radius:14px;
    background:#fff;border:1px solid rgba(0,173,188,.25);
    box-shadow:0 4px 14px rgba(0,80,90,.06);
  }
  .info-card.accent{
    background:var(--c-primary);border-color:var(--c-primary);
    box-shadow:0 6px 20px rgba(0,173,188,.3);
  }
  .info-label{
    display:inline-block;font-size:20px;font-weight:700;letter-spacing:.1em;
    color:var(--c-primary-dark);
    padding:4px 14px;border-radius:999px;background:var(--c-tint);
  }
  .info-card.accent .info-label{
    color:var(--c-primary-darker);background:#fff;
  }
  .info-value{
    font-size:28px;font-weight:800;color:var(--c-text);letter-spacing:.02em;
    line-height:1.2;white-space:nowrap;
  }
  .info-card.accent .info-value{color:#fff}
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="top">
    <span class="badge">Interop Tokyo 2026 / W3C ブース 5D24 （幕張メッセ）</span>
  </div>

  <div class="main">
    <p class="kicker">MCM-JP CG</p>
    <h1>業界を越えて、<br>メディアをつなぐ</h1>
    <p class="tagline">〜 相互理解から、新たな価値の共創へ 〜</p>
  </div>

  <div class="info-row">
    <div class="info-card">
      <span class="info-label">会期</span>
      <span class="info-value">2026年6月10日（水）〜12日（金）</span>
    </div>
    <div class="info-card accent">
      <span class="info-label">ミニセミナー</span>
      <span class="info-value">6月12日（金） 14:00〜14:30</span>
    </div>
  </div>
</body>
</html>
